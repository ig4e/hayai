name: Release Builder
on:
  push:
    branches:
      - "release"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release app
    runs-on: ubuntu-latest
    environment: build

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          version_name=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          CURRENT_VERSION="v${{ steps.app_version.outputs.version_name }}"
          PREV_TAG=""
          while IFS= read -r tag; do
            if [ "$tag" != "$CURRENT_VERSION" ] && [[ "$tag" != beta-* ]]; then
              PREV_TAG="$tag"
              break
            fi
          done < <(git tag -l "v*" --sort=-version:refname)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          CHANGELOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No changes recorded"
          fi
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # SY -->
      - name: Write google-services.json
        uses: DamianReeves/write-file-action@v1.3
        with:
          path: app/google-services.json
          contents: ${{ secrets.GOOGLE_SERVICES_TEXT }}
          write-mode: overwrite

      - name: Build app
        run: ./gradlew assembleStandardRelease

      # - name: Run unit tests
      #   run: ./gradlew testReleaseUnitTest testStandardReleaseUnitTest

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/standard/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.1"

      - name: Clean up build artifacts
        run: |
          set -e
          VERSION=${{ steps.app_version.outputs.version_name }}

          mv app/build/outputs/apk/standard/release/app-standard-universal-release-unsigned-signed.apk hayai-v${VERSION}.apk
          sha=`sha256sum hayai-v${VERSION}.apk | awk '{ print $1 }'`
          echo "APK_UNIVERSAL_SHA=$sha" >> $GITHUB_ENV

          mv app/build/outputs/apk/standard/release/app-standard-arm64-v8a-release-unsigned-signed.apk hayai-v${VERSION}-arm64-v8a.apk
          sha=`sha256sum hayai-v${VERSION}-arm64-v8a.apk | awk '{ print $1 }'`
          echo "APK_ARM64_V8A_SHA=$sha" >> $GITHUB_ENV

          mv app/build/outputs/apk/standard/release/app-standard-armeabi-v7a-release-unsigned-signed.apk hayai-v${VERSION}-armeabi-v7a.apk
          sha=`sha256sum hayai-v${VERSION}-armeabi-v7a.apk | awk '{ print $1 }'`
          echo "APK_ARMEABI_V7A_SHA=$sha" >> $GITHUB_ENV

          mv app/build/outputs/apk/standard/release/app-standard-x86-release-unsigned-signed.apk hayai-v${VERSION}-x86.apk
          sha=`sha256sum hayai-v${VERSION}-x86.apk | awk '{ print $1 }'`
          echo "APK_X86_SHA=$sha" >> $GITHUB_ENV

          mv app/build/outputs/apk/standard/release/app-standard-x86_64-release-unsigned-signed.apk hayai-v${VERSION}-x86_64.apk
          sha=`sha256sum hayai-v${VERSION}-x86_64.apk | awk '{ print $1 }'`
          echo "APK_X86_64_SHA=$sha" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.app_version.outputs.version_name }}
          name: Hayai v${{ steps.app_version.outputs.version_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### Checksums

            | Variant | SHA-256 |
            | ------- | ------- |
            | Universal | ${{ env.APK_UNIVERSAL_SHA }} |
            | arm64-v8a | ${{ env.APK_ARM64_V8A_SHA }} |
            | armeabi-v7a | ${{ env.APK_ARMEABI_V7A_SHA }} |
            | x86 | ${{ env.APK_X86_SHA }} |
            | x86_64 | ${{ env.APK_X86_64_SHA }} |

            ## If you are unsure which version to choose then go with hayai-v${{ steps.app_version.outputs.version_name }}.apk
          files: |
            hayai-v${{ steps.app_version.outputs.version_name }}.apk
            hayai-v${{ steps.app_version.outputs.version_name }}-arm64-v8a.apk
            hayai-v${{ steps.app_version.outputs.version_name }}-armeabi-v7a.apk
            hayai-v${{ steps.app_version.outputs.version_name }}-x86.apk
            hayai-v${{ steps.app_version.outputs.version_name }}-x86_64.apk
          draft: true
          prerelease: false
          append_body: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
