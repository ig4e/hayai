name: Beta Release Builder
on:
  push:
    tags:
      - "beta-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build beta app
    runs-on: ubuntu-latest
    environment: build

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Android SDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          version_name=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"

      - name: Build beta app
        run: ./gradlew assembleBetaRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/beta/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.1"

      - name: Clean up build artifacts
        run: |
          set -e

          mv app/build/outputs/apk/beta/release/app-beta-universal-release-unsigned-signed.apk hayai-beta.apk
          sha=`sha256sum hayai-beta.apk | awk '{ print $1 }'`
          echo "APK_UNIVERSAL_SHA=$sha" >> $GITHUB_ENV

          mv app/build/outputs/apk/beta/release/app-beta-arm64-v8a-release-unsigned-signed.apk hayai-beta-arm64-v8a.apk
          sha=`sha256sum hayai-beta-arm64-v8a.apk | awk '{ print $1 }'`
          echo "APK_ARM64_V8A_SHA=$sha" >> $GITHUB_ENV

          mv app/build/outputs/apk/beta/release/app-beta-armeabi-v7a-release-unsigned-signed.apk hayai-beta-armeabi-v7a.apk
          sha=`sha256sum hayai-beta-armeabi-v7a.apk | awk '{ print $1 }'`
          echo "APK_ARMEABI_V7A_SHA=$sha" >> $GITHUB_ENV

          mv app/build/outputs/apk/beta/release/app-beta-x86-release-unsigned-signed.apk hayai-beta-x86.apk
          sha=`sha256sum hayai-beta-x86.apk | awk '{ print $1 }'`
          echo "APK_X86_SHA=$sha" >> $GITHUB_ENV

          mv app/build/outputs/apk/beta/release/app-beta-x86_64-release-unsigned-signed.apk hayai-beta-x86_64.apk
          sha=`sha256sum hayai-beta-x86_64.apk | awk '{ print $1 }'`
          echo "APK_X86_64_SHA=$sha" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hayai Beta v${{ steps.app_version.outputs.version_name }}
          body: |
            ---

            ### Checksums

            | Variant | SHA-256 |
            | ------- | ------- |
            | Universal | ${{ env.APK_UNIVERSAL_SHA }} |
            | arm64-v8a | ${{ env.APK_ARM64_V8A_SHA }} |
            | armeabi-v7a | ${{ env.APK_ARMEABI_V7A_SHA }} |
            | x86 | ${{ env.APK_X86_SHA }} |
            | x86_64 | ${{ env.APK_X86_64_SHA }} |

            ## If you are unsure which version to choose then go with hayai-beta.apk
          files: |
            hayai-beta.apk
            hayai-beta-arm64-v8a.apk
            hayai-beta-armeabi-v7a.apk
            hayai-beta-x86.apk
            hayai-beta-x86_64.apk
          draft: true
          prerelease: true
          append_body: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
