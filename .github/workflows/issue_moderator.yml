name: Issue moderator

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]

jobs:
  moderate:
    runs-on: ubuntu-latest
    steps:
      - name: Moderate issues
        uses: tachiyomiorg/issue-moderator-action@v2.6.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          duplicate-label: Duplicate

          auto-close-rules: |
            [
              {
                "type": "body",
                "regex": ".*DELETE THIS SECTION IF YOU HAVE READ AND ACKNOWLEDGED IT.*",
                "message": "The acknowledgment section was not removed."
              },
              {
                "type": "body",
                "regex": ".*\\* (Tachiyomi version|Android version|Device): \\?.*",
                "message": "Requested information in the template was not filled out."
              },
              {
                "type": "both",
                "regex": "^(?!.*myanimelist.*).*(aniyomi|anime).*$",
                "ignoreCase": true,
                "message": "Hayai does not support anime and is not affiliated with Aniyomi: https://github.com/jmir1/aniyomi"
              },
              {
                "type": "both",
                "regex": ".*(?:fail(?:ed|ure|s)?|can\\s*(?:no|')?t|(?:not|un).*able|(?<!n[o']?t )blocked by|error) (?:to )?(?:get past|by ?pass|penetrate)?.*cloud ?fl?are.*",
                "ignoreCase": true,
                "labels": ["Cloudflare protected"],
                "message": "This is usually a site-side Cloudflare problem rather than an app bug. Try another source, wait for the site to lower protection, or test again later."
              },
              {
                "type": "both",
                "regex": "^.*(myanimelist|mal).*$",
                "ignoreCase": true,
                "message": "For MyAnimeList linking problems:\n1. Update Hayai to the latest release\n2. Change your default User-Agent (`More → Settings → Advanced → Default user agent string`)\n3. Close and restart Hayai\n4. Try linking MyAnimeList again\n\nIf MyAnimeList was linked before, unlink it first and then retry."
              }
            ]
          auto-close-ignore-label: do-not-autoclose
